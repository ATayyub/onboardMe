name: Nightly Health Check

on:
  schedule:
    - cron: "0 2 * * *" # 2am UTC every night
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  health:
    name: Health + Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Check /api/health (production)
        run: |
          RESPONSE=$(curl -sf https://onboardme-gules.vercel.app/api/health)
          echo "Response: $RESPONSE"
          DB=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('db','unknown'))")
          if [ "$DB" != "ok" ]; then
            echo "::error::Health check failed — db=$DB (Supabase may be paused)"
            exit 1
          fi
          echo "Health check passed — db=$DB"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        # Use STAGING_URL when available to avoid polluting production data.
        # The nightly health check above still always targets production.
        run: npm run test:prod
        env:
          BASE_URL: ${{ vars.STAGING_URL || 'https://onboardme-gules.vercel.app' }}

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: playwright-report/
          retention-days: 14
